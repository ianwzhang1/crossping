name: Build Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('Pipfile.lock', 'pyproject.toml', '.github/workflows/windows-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ steps.setup-python.outputs.python-version }}-

      - name: Cache pipenv virtualenv
        id: cache-venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('Pipfile.lock', 'pyproject.toml', 'packaging/crossping.spec', '.github/workflows/windows-build.yml') }}
          restore-keys: |
            ${{ runner.os }}-venv-${{ steps.setup-python.outputs.python-version }}-

      - name: Install pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install project dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        env:
          PIPENV_VENV_IN_PROJECT: "1"
        run: |
          pipenv install --dev
          pipenv run pip install -e ".[desktop]" pefile

      - name: Run test suite
        env:
          PIPENV_VENV_IN_PROJECT: "1"
        run: pipenv run pytest

      - name: Build Windows package
        env:
          PIPENV_VENV_IN_PROJECT: "1"
        run: pipenv run pyinstaller packaging/crossping.spec

      - name: Smoke test packaged app startup
        shell: pwsh
        run: |
          $exe = Resolve-Path "dist\CrossPing.exe"
          $configDir = Join-Path $env:RUNNER_TEMP "crossping-config"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          $env:CROSSPING_CONFIG_DIR = $configDir
          $process = Start-Process -FilePath $exe -ArgumentList @() -PassThru -WorkingDirectory (Split-Path $exe)
          Start-Sleep -Seconds 8
          if ($process.HasExited) {
            throw "Packaged app exited early with code $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id -Force

      - name: Archive build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist\* -DestinationPath release\CrossPing-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossPing-windows
          path: release/CrossPing-windows.zip
          if-no-files-found: error
