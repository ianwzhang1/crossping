name: Build Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install project dependencies
        env:
          PIPENV_VENV_IN_PROJECT: "1"
        run: |
          pipenv install --dev
          pipenv run pip install -e ".[desktop]"

      - name: Run test suite
        env:
          PIPENV_VENV_IN_PROJECT: "1"
        run: pipenv run pytest

      - name: Build Windows package
        env:
          PIPENV_VENV_IN_PROJECT: "1"
        run: pipenv run pyinstaller packaging/crossping.spec

      - name: Archive build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist\* -DestinationPath release\CrossPing-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossPing-windows
          path: release/CrossPing-windows.zip
          if-no-files-found: error
